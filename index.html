<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CourtEyeIQ</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0f0b;
      --green: #16a36f;
      --card: #111812;
      --card-border: #243328;
      --text: #f2f7f3;
      --muted: #98a69d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    main {
      width: min(960px, 100%);
    }

    h1 {
      margin: 0 0 36px;
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 1;
      text-align: center;
      font-weight: 800;
    }

    h1 span {
      color: var(--green);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      min-height: 176px;
      padding: 24px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: var(--card);
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    .card:hover,
    .card:focus-visible {
      border-color: var(--green);
      background: #142017;
      transform: translateY(-2px);
      outline: none;
    }

    .label {
      font-size: 1.35rem;
      font-weight: 750;
    }

    .status {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 650;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      body {
        place-items: start center;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 132px;
      }
    }
  </style>
</head>
<body>
  <main aria-label="CourtEyeIQ hub">
    <h1>Court<span>Eye</span>IQ</h1>

    <nav class="grid" aria-label="CourtEyeIQ destinations">
      <a class="card" href="/clipper">
        <span class="label">✂️ Clipper</span>
        <span class="status">Beta</span>
      </a>

      <a class="card" href="https://tennisswcourtiqpat2012donotcopy.vercel.app/display.html">
        <span class="label">🎾 Live Display</span>
        <span class="status">Internal</span>
      </a>

      <a class="card" href="/roadmap">
        <span class="label">🗺️ Roadmap</span>
        <span class="status">Coming soon</span>
      </a>
    </nav>
  </main>
</body>
</html>
